seed: 1234

dataset:
  band_order: [B02, B03, B04, B05, B06, B07, B08, B8A, B11, B12]
  nodata_value: 0
  min_valid_bands: 3

normalization:
  type: zscore
  stats_path: data/oscd_band_stats.json
  stats_band_order: [B01, B02, B03, B04, B05, B06, B07, B08, B09, B10, B11, B12, B8A]
  ignore_nodata: true
  eps: 1.0e-6

subspace:
  # Primary temporal construction: X_t is (common spatial locations x bands),
  # and the leading left singular vectors define one date subspace in pixel space.
  construction: band_image
  preprocessing: centered
  # MultiSenGE contains 10 Sentinel-2 bands. Retaining rank 10 implements the
  # full band-image span; lower ranks remain explicit ablations.
  rank_r: 10
  min_common_pixels: 1024
  variance_threshold: null
  use_randomized_pca: true
  pixel_sample: 0

temporal:
  # The second-order paper assumes equal time intervals. A triple is treated as
  # approximately balanced only when max(left_gap,right_gap)/min(...) <= 1.5.
  balanced_gap_ratio: 1.5
